<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>過去ログ</title>
</head>

<body>

<h1>過去ログ</h1>

<div id="logs"></div>

<script>

let log = JSON.parse(localStorage.getItem("log") || "{}")

let html = ""

for(let day in log){

html += "<h3>"+day+"</h3>"
html += "<p>"+log[day]+"</p>"

}

document.getElementById("logs").innerHTML = html

</script>

</body>
</html>
